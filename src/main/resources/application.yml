spring:
  datasource:
    url: jdbc:mysql://mysql:3306/uniperDB
    username: uniper
    password: 0000
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  #MongoDB
  data:
    mongodb:
      uri: mongodb://uniper:0000@mongodb:27017/uniperDB
      database: uniperDB

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html