version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: uniper_mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: uniperDB
      MYSQL_USER: uniper
      MYSQL_PASSWORD: "0000"
      MYSQL_ROOT_PASSWORD: root123
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  mongodb:
    image: mongo:latest
    container_name: uniper_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: uniperDB
    volumes:
      - mongodb_data:/data/db
      - ./init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro

  app:
    build: .
    container_name: uniper_app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/uniperDB
      SPRING_DATASOURCE_USERNAME: uniper
      SPRING_DATASOURCE_PASSWORD: "0000"
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/uniperDB
    depends_on:
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_started

volumes:
  mysql_data:
  mongodb_data: